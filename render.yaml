services:
  - type: web
    name: tubercool-backend
    env: docker
    rootDir: backend
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tubercool-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        value: '["https://tubercool.vercel.app","http://localhost:3000","http://localhost:3001"]'
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: tubercool-db
    plan: free
    region: ohio
