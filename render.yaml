services:
  - type: web
    name: tubercool-backend
    env: docker
    rootDir: backend
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tubercool-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://tubercool.vercel.app,http://localhost:3000,http://localhost:3001"
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: tubercool-db
    plan: free
    region: ohio
